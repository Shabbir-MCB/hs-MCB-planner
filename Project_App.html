    </div>
  `);
}
function handleFinishDateEntered(val) {
  document.getElementById('quantityModeWrap').style.display = val ? '' : 'none';
}
function recalcFinishFromDuration() {
  const startEl = document.getElementById('actPlanStart');
  const durEl = document.getElementById('actDuration');
  const finishEl = document.getElementById('actPlanFinish');
  if (!startEl.value || !durEl.value) return;
  const start = new Date(startEl.value);
  const finish = new Date(start);
  finish.setDate(finish.getDate() + (parseInt(durEl.value) - 1)); // duration includes the start day
  finishEl.value = finish.toISOString().slice(0, 10);
}
function recalcDurationFromFinish() {
  const startEl = document.getElementById('actPlanStart');
  const finishEl = document.getElementById('actPlanFinish');
  const durEl = document.getElementById('actDuration');
  if (!startEl.value || !finishEl.value) return;
  const days = daysBetween(startEl.value, finishEl.value) + 1;
  if (days > 0) durEl.value = days;
}
async function saveActivityModal(existingId) {
  const longDesc = document.getElementById('actLongDesc').value;
  const activity = {
    ActivityID: existingId || undefined,
    WBS_Code: document.getElementById('actWBS').value,
    LongDescription: longDesc,
    ShortDescription: document.getElementById('actShortDesc').value || autoShortDescription(longDesc),
    Group1: document.getElementById('actGroup1').value,
    Group2: document.getElementById('actGroup2').value,
    Group3: document.getElementById('actGroup3').value,
    Type: 'task',
    PlannedStart: document.getElementById('actPlanStart').value,
    PlannedFinish: document.getElementById('actPlanFinish').value,
    DurationDays: document.getElementById('actDuration').value,
    ActualStart: document.getElementById('actActualStart').value,
    ActualFinish: document.getElementById('actActualFinish').value,
    QuantityMode: document.getElementById('actQtyMode') ? document.getElementById('actQtyMode').value : '',
    ActualQuantity: document.getElementById('actActualQty') ? document.getElementById('actActualQty').value : '',
    PercentComplete: document.getElementById('actPctComplete').value,
    ColorTag: document.getElementById('actColorTag').value,
    Notes: document.getElementById('actNotes').value,
    WeightFactor: 1,
  };
  const res = await apiPost('saveActivity', { user: STATE.user, activity });
  closeModal();
  if (res.success) { showToast('Activity saved', 'success'); await loadAll(); }
  else showToast('Save failed: ' + res.error, 'error');
}

/* ---- Linking activities (predecessor/successor) from Activities tab ---- */
function openLinkActivityModal(activityId) {
  const a = getActivityById(activityId);
  openModal(`
    <h2>Link predecessors for "${a.ShortDescription}"</h2>
    <div class="field">
      <label>Search activities to add as predecessor</label>
      <input type="text" id="linkActSearch" placeholder="Type to search…" oninput="renderLinkActivityOptions('${activityId}')">
    </div>
    <div id="linkActOptions" style="max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:10px;"></div>
    <h3 style="font-size:13px;margin-bottom:8px;">Existing links</h3>
    <div id="existingLinksList"></div>
    <div class="actions"><button class="btn primary" onclick="closeModal()">Done</button></div>
  `);
  renderLinkActivityOptions(activityId);
  renderExistingLinksList(activityId);
}
function renderLinkActivityOptions(activityId) {
  const search = (document.getElementById('linkActSearch')?.value || '').toLowerCase();
  const matches = STATE.activities.filter(a => a.ActivityID !== activityId && a.ShortDescription && a.ShortDescription.toLowerCase().includes(search)).slice(0, 30);
  document.getElementById('linkActOptions').innerHTML = matches.map(a => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);">
      <span style="flex:1;">${a.ShortDescription}</span>
      <select id="linkType_${a.ActivityID}" style="width:90px;">
        <option value="FS">FS</option><option value="SS">SS</option><option value="FF">FF</option><option value="SF">SF</option>
      </select>
      <input type="number" id="linkLag_${a.ActivityID}" value="0" style="width:60px" title="lag days">
      <button class="btn sm primary" onclick="addPredecessorLink('${a.ActivityID}','${activityId}')">add</button>
    </div>
  `).join('') || `<div class="empty-state">No matches</div>`;
}
async function addPredecessorLink(predId, succId) {
  const linkType = document.getElementById('linkType_' + predId).value;
  const lag = document.getElementById('linkLag_' + predId).value;
  const link = { LinkID: uid('LNK'), PredecessorID: predId, SuccessorID: succId, LinkType: linkType, LagDays: lag };
  const res = await apiPost('saveLink', { user: STATE.user, link });
  if (res.success) {
    STATE.links.push(link);
    showToast('Link added', 'success');
    renderExistingLinksList(succId);
  }
}
function renderExistingLinksList(activityId) {
  const links = STATE.links.filter(l => l.SuccessorID === activityId);
  document.getElementById('existingLinksList').innerHTML = links.map(l => {
    const p = getActivityById(l.PredecessorID);
    return `<div style="display:flex;justify-content:space-between;padding:6px 4px;border-bottom:1px solid var(--border);">
      <span>${p ? p.ShortDescription : l.PredecessorID} <span style="color:var(--text-faint);font-size:11px;">(${l.LinkType}, lag ${l.LagDays||0}d)</span></span>
      <button class="btn sm danger" onclick="removeLink('${l.LinkID}','${activityId}')">remove</button>
    </div>`;
  }).join('') || `<div style="color:var(--text-faint);font-size:12px;">No predecessors linked.</div>`;
}
async function removeLink(linkId, activityId) {
  const res = await apiPost('deleteLink', { linkId });
  if (res.success) {
    STATE.links = STATE.links.filter(l => l.LinkID !== linkId);
    renderExistingLinksList(activityId);
    showToast('Link removed', 'success');
  }
}
</script>
<script>
/* =====================================================================
   GANTT CHART — rendering engine (called from the combined
   Activities & Gantt view; see renderActivitiesAndGantt above)
   ===================================================================== */
let ganttDragState = null;
let ganttLinkState = null;

function setGanttZoom(zoom) {
  STATE.ganttZoom = zoom;
  renderGanttBody();
}

function getGanttDateRange() {
  const allDates = [];
  STATE.activities.forEach(a => {
    if (a.PlannedStart) allDates.push(new Date(a.PlannedStart));
    if (a.PlannedFinish) allDates.push(new Date(a.PlannedFinish));
  });
  STATE.events.forEach(e => {
    if (e.StartDate) allDates.push(new Date(e.StartDate));
    if (e.EndDate) allDates.push(new Date(e.EndDate));
  });
  if (allDates.length === 0) {
    const now = new Date();
    return { start: now, end: new Date(now.getTime() + 90 * 86400000) };
  }
  const min = new Date(Math.min(...allDates));
  const max = new Date(Math.max(...allDates));
  min.setDate(min.getDate() - 5);
  max.setDate(max.getDate() + 10);
  return { start: min, end: max };
}

function renderGanttBody() {
  const dayW = CONFIG.DAY_WIDTH[STATE.ganttZoom];
  const { start, end } = getGanttDateRange();
  const totalDays = Math.max(1, Math.round((end - start) / 86400000));

  let acts = STATE.activities.filter(a => a.Type !== 'event'); // events render as bands, not rows, but milestones do get rows
  if (STATE.ganttColorFilter) acts = acts.filter(a => a.ColorTag === STATE.ganttColorFilter);
  const rollup = document.getElementById('showRollupToggle')?.checked;
  if (rollup) acts = acts.filter(a => a.IsRollup === true || a.IsRollup === 'TRUE' || !a.RollupParentID);

  // --- Left grid: labels ---
  const gridEl = document.getElementById('ganttGrid');
  gridEl.innerHTML = `<div class="gantt-header-row">Activity</div>` +
    acts.map(a => `
      <div class="gantt-row-label" title="${a.ShortDescription}">
        <span class="id-badge">${a.ActivityID.slice(-6)}</span>
        ${a.ShortDescription || '(untitled)'}
      </div>`).join('');

  // --- Right scroll: day headers + bars ---
  const scrollEl = document.getElementById('ganttScroll');
  let dayHeaderHTML = '<div class="gantt-day-header" id="ganttDayHeader">';
  let cursor = new Date(start);
  for (let i = 0; i < totalDays; i++) {
    const label = STATE.ganttZoom === 'month'
      ? (cursor.getDate() === 1 ? cursor.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }) : '')
      : STATE.ganttZoom === 'week'
        ? (cursor.getDay() === 1 ? cursor.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) : '')
        : cursor.getDate();
    dayHeaderHTML += `<div class="gantt-day-cell" style="width:${dayW}px;">${label}</div>`;
    cursor.setDate(cursor.getDate() + 1);
  }
  dayHeaderHTML += '</div>';

  let bodyHTML = `<div id="ganttBarsArea" style="position:relative;width:${totalDays*dayW}px;">`;

  // event bands (non-progress events drawn as background bands across all rows)
  STATE.events.forEach(ev => {
    if (!ev.StartDate) return;
    const left = Math.round((new Date(ev.StartDate) - start) / 86400000) * dayW;
    const width = ev.EndDate ? Math.max(dayW, Math.round((new Date(ev.EndDate) - new Date(ev.StartDate)) / 86400000) * dayW) : dayW;
    bodyHTML += `<div class="gantt-event-band" style="left:${left}px;width:${width}px;height:${acts.length*32}px;" title="${ev.EventName} (${ev.EventType})"></div>`;
  });

  // today line
  const todayLeft = Math.round((new Date() - start) / 86400000) * dayW;
  bodyHTML += `<div class="gantt-today-line" style="left:${todayLeft}px;height:${acts.length*32}px;"></div>`;

  acts.forEach((a, idx) => {
    const top = idx * 32;
    if (a.Type === 'milestone') {
      if (!a.PlannedStart) return;
      const left = Math.round((new Date(a.PlannedStart) - start) / 86400000) * dayW;
      bodyHTML += `<div class="gantt-milestone" style="left:${left}px;top:${top+4}px;" title="${a.ShortDescription}" onclick="openActivityModal('${a.ActivityID}')"></div>`;
      return;
    }
    if (!a.PlannedStart || !a.PlannedFinish) return;
    const left = Math.round((new Date(a.PlannedStart) - start) / 86400000) * dayW;
    const width = Math.max(dayW, Math.round((new Date(a.PlannedFinish) - new Date(a.PlannedStart)) / 86400000) * dayW);
    const pct = Number(a.PercentComplete) || 0;
    const colorObj = STATE.colors.find(c => c.ColorTagID === a.ColorTag);
    const barColor = colorObj ? colorObj.HexCode : '#3B82F6';

    // baseline bar (if exists and toggle on)
    if (document.getElementById('showBaselineToggle')?.checked) {
      const bl = STATE.baselines.find(b => b.ActivityID === a.ActivityID && (b.IsActive === true || b.IsActive === 'TRUE'));
      if (bl && bl.BaselineStart && bl.BaselineFinish) {
        const blLeft = Math.round((new Date(bl.BaselineStart) - start) / 86400000) * dayW;
        const blWidth = Math.max(dayW, Math.round((new Date(bl.BaselineFinish) - new Date(bl.BaselineStart)) / 86400000) * dayW);
        bodyHTML += `<div class="gantt-baseline-bar" style="left:${blLeft}px;top:${top+24}px;width:${blWidth}px;" title="Baseline: ${fmtDate(bl.BaselineStart)} - ${fmtDate(bl.BaselineFinish)}"></div>`;
      }
    }

    bodyHTML += `
      <div class="gantt-bar" data-activity-id="${a.ActivityID}" style="left:${left}px;top:${top+5}px;width:${width}px;background:${barColor};"
        title="${a.ShortDescription} | ${fmtDate(a.PlannedStart)} - ${fmtDate(a.PlannedFinish)} | ${pct}%">
        <div class="progress-fill" style="width:${pct}%;"></div>
        <span class="bar-label">${a.ShortDescription || ''}</span>
        <div class="resize-handle left" data-side="left"></div>
        <div class="resize-handle right" data-side="right"></div>
        <div class="link-handle left" title="Drag to link as successor"></div>
        <div class="link-handle right" title="Drag to link as predecessor"></div>
      </div>`;

    // off-day dotted breaks: draw a thin dotted strip over each non-working
    // day that falls within this activity's span, so the bar visually shows
    // the gap instead of implying continuous work through a holiday/Friday.
    {
      const offCfg = getOffDaysConfig();
      if (offCfg.weeklyOff.length || offCfg.specificDates.length) {
        let dayCursor = new Date(a.PlannedStart);
        const finishDate = new Date(a.PlannedFinish);
        while (dayCursor <= finishDate) {
          if (isOffDay(dayCursor)) {
            const offLeft = Math.round((dayCursor - start) / 86400000) * dayW;
            bodyHTML += `<div style="position:absolute;left:${offLeft}px;top:${top+5}px;width:${dayW}px;height:calc(var(--gantt-row-h) - 10px);
              background:repeating-linear-gradient(45deg,rgba(255,255,255,0.0) 0,rgba(255,255,255,0.0) 3px,rgba(15,20,25,0.55) 3px,rgba(15,20,25,0.55) 6px);
              border-left:1px dotted rgba(255,255,255,0.6);border-right:1px dotted rgba(255,255,255,0.6);z-index:2;pointer-events:none;"
              title="Non-working day"></div>`;
          }
          dayCursor.setDate(dayCursor.getDate() + 1);
        }
      }
    }
  });

  // dependency link lines (simple elbow connectors)
  STATE.links.forEach(l => {
    const predIdx = acts.findIndex(a => a.ActivityID === l.PredecessorID);
    const succIdx = acts.findIndex(a => a.ActivityID === l.SuccessorID);
    if (predIdx === -1 || succIdx === -1) return;
    const pred = acts[predIdx], succ = acts[succIdx];
    if (!pred.PlannedFinish || !succ.PlannedStart) return;
    const x1 = Math.round((new Date(pred.PlannedFinish) - start) / 86400000) * dayW;
    const y1 = predIdx * 32 + 16;
    const x2 = Math.round((new Date(succ.PlannedStart) - start) / 86400000) * dayW;
    const y2 = succIdx * 32 + 16;
    bodyHTML += `<svg class="gantt-link-line" style="left:0;top:0;width:${totalDays*dayW}px;height:${acts.length*32}px;">
      <path d="M${x1},${y1} L${x1+10},${y1} L${x1+10},${y2} L${x2},${y2}" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#ganttArrow)"/>
    </svg>`;
  });

  bodyHTML += `<svg width="0" height="0"><defs><marker id="ganttArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#666"/></marker></defs></svg>`;
  bodyHTML += '</div>';

  scrollEl.innerHTML = dayHeaderHTML + bodyHTML;

  attachGanttDragHandlers();
  attachGanttLinkHandlers();

  // sync vertical scroll between grid and bars
  scrollEl.onscroll = () => { document.getElementById('ganttGrid').scrollTop = scrollEl.scrollTop; };
}

/* ---- Drag to move / resize bars ---- */
function attachGanttDragHandlers() {
  const bars = document.querySelectorAll('.gantt-bar');
  bars.forEach(bar => {
    bar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('resize-handle') || e.target.classList.contains('link-handle')) return;
      const activityId = bar.dataset.activityId;
      ganttDragState = { activityId, startX: e.clientX, originalLeft: parseInt(bar.style.left), mode: 'move' };
      bar.classList.add('dragging');
      e.preventDefault();
    });
    bar.querySelectorAll('.resize-handle').forEach(handle => {
      handle.addEventListener('mousedown', (e) => {
        const activityId = bar.dataset.activityId;
        ganttDragState = {
          activityId, startX: e.clientX,
          originalLeft: parseInt(bar.style.left), originalWidth: parseInt(bar.style.width),
          mode: 'resize-' + handle.dataset.side,
        };
        e.stopPropagation();
        e.preventDefault();
      });
    });
  });
}
document.addEventListener('mousemove', (e) => {
  if (!ganttDragState) return;
  const dayW = CONFIG.DAY_WIDTH[STATE.ganttZoom];
  const deltaPx = e.clientX - ganttDragState.startX;
  const deltaDays = Math.round(deltaPx / dayW);
  const bar = document.querySelector(`.gantt-bar[data-activity-id="${ganttDragState.activityId}"]`);
  if (!bar) return;
  if (ganttDragState.mode === 'move') {
    bar.style.left = (ganttDragState.originalLeft + deltaDays * dayW) + 'px';
  } else if (ganttDragState.mode === 'resize-left') {
    bar.style.left = (ganttDragState.originalLeft + deltaDays * dayW) + 'px';
    bar.style.width = Math.max(dayW, ganttDragState.originalWidth - deltaDays * dayW) + 'px';
  } else if (ganttDragState.mode === 'resize-right') {
    bar.style.width = Math.max(dayW, ganttDragState.originalWidth + deltaDays * dayW) + 'px';
  }
  ganttDragState.deltaDays = deltaDays;
});
document.addEventListener('mouseup', async () => {
  if (!ganttDragState) return;
  const bar = document.querySelector(`.gantt-bar[data-activity-id="${ganttDragState.activityId}"]`);
  bar?.classList.remove('dragging');
  const deltaDays = ganttDragState.deltaDays || 0;
  if (deltaDays !== 0) {
    const a = getActivityById(ganttDragState.activityId);
    const { start } = getGanttDateRange();
    let newStart = new Date(a.PlannedStart), newFinish = new Date(a.PlannedFinish);
    if (ganttDragState.mode === 'move') {
      newStart.setDate(newStart.getDate() + deltaDays);
      newFinish.setDate(newFinish.getDate() + deltaDays);
    } else if (ganttDragState.mode === 'resize-left') {
      newStart.setDate(newStart.getDate() + deltaDays);
    } else if (ganttDragState.mode === 'resize-right') {
      newFinish.setDate(newFinish.getDate() + deltaDays);
    }
    a.PlannedStart = newStart.toISOString().slice(0, 10);
    a.PlannedFinish = newFinish.toISOString().slice(0, 10);
    await apiPost('saveActivity', { user: STATE.user, activity: a });
    showToast('Dates updated (links preserved)', 'success');
    renderGanttBody();
    renderActivitiesTableBody();
  }
  ganttDragState = null;
});

/* ---- Drag to link two bars ---- */
function attachGanttLinkHandlers() {
  document.querySelectorAll('.link-handle').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      const bar = handle.closest('.gantt-bar');
      ganttLinkState = { fromId: bar.dataset.activityId, fromSide: handle.classList.contains('right') ? 'right' : 'left' };
    });
  });
  document.querySelectorAll('.gantt-bar').forEach(bar => {
    bar.addEventListener('mouseup', async (e) => {
      if (!ganttLinkState) return;
      const toId = bar.dataset.activityId;
      if (toId !== ganttLinkState.fromId) {
        const linkType = ganttLinkState.fromSide === 'right' ? 'FS' : 'SF';
        const link = { LinkID: uid('LNK'), PredecessorID: ganttLinkState.fromId, SuccessorID: toId, LinkType: linkType, LagDays: 0 };
        const res = await apiPost('saveLink', { user: STATE.user, link });
        if (res.success) {
          STATE.links.push(link);
          showToast('Activities linked', 'success');
          renderGanttBody();
        }
      }
      ganttLinkState = null;
    });
  });
}

function openBaselineFreezeModal() {
  openModal(`
    <h2>Freeze baseline</h2>
    <p style="color:var(--text-dim);margin-bottom:14px;">
      This captures the current planned dates of every activity as a named baseline.
      You can freeze multiple baselines over time and compare them visually on the Gantt chart.
    </p>
    <div class="field"><label>Baseline name</label><input id="freezeBaselineName" placeholder="e.g. Baseline 0, Revised Baseline 1"></div>
    <div class="field"><label>Reason / notes</label><textarea id="freezeBaselineReason" rows="2"></textarea></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => freezeBaseline())">Freeze now</button>
    </div>
  `);
}
async function freezeBaseline() {
  const name = document.getElementById('freezeBaselineName').value || ('Baseline ' + (STATE.baselines.length + 1));
  const reason = document.getElementById('freezeBaselineReason').value;
  closeModal();
  showToast('Freezing baseline for ' + STATE.activities.length + ' activities…', '');
  for (const a of STATE.activities.filter(x => x.Type === 'task')) {
    const baseline = {
      BaselineID: uid('BL'), BaselineName: name, BaselineType: name,
      ActivityID: a.ActivityID, BaselineStart: a.PlannedStart, BaselineFinish: a.PlannedFinish,
      Reason: reason, IsActive: true,
    };

    await apiPost('saveBaseline', { user: STATE.user, baseline });

  renderGanttBody();
}

/* ---- Off-days calendar modal ---- */
function openOffDaysModal() {
  const cfg = getOffDaysConfig();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  openModal(`
    <h2>Off-days calendar</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:14px;">
      Define non-working days for this project. They'll show as a dotted-line break
      across the Gantt bars instead of solid progress, and won't count toward duration.
      This calendar is set per project — define whatever fits this specific site.
    </p>
    <div class="field">
      <label>Weekly day(s) off</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${dayNames.map((d,i) => `
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;">
            <input type="checkbox" class="weeklyOffCheck" value="${i}" ${cfg.weeklyOff.includes(i)?'checked':''}> ${d}
          </label>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Specific dates off (holidays, Eid, Muharram, declared stoppages, etc.)</label>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="date" id="newOffDate">
        <input type="text" id="newOffDateLabel" placeholder="Label (e.g. Eid al-Fitr)" style="flex:1;">
        <button class="btn sm" onclick="addSpecificOffDate()">+ Add</button>
      </div>
      <div id="specificOffDatesList"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => saveOffDaysConfig())">Save calendar</button>
    </div>
  `);
  window._pendingOffDaysSpecific = cfg.specificDates.map(d => ({ date: d, label: '' }));
  // recover labels if previously stored as objects, fall back gracefully if just strings
  try {
    const rawCfg = JSON.parse(STATE.projectInfo.OffDaysJSON || '{}');
    if (rawCfg.specificDatesWithLabels) window._pendingOffDaysSpecific = rawCfg.specificDatesWithLabels;
  } catch(e) {}
  renderSpecificOffDatesList();
}
function renderSpecificOffDatesList() {
  const list = window._pendingOffDaysSpecific || [];
  document.getElementById('specificOffDatesList').innerHTML = list.length === 0
    ? `<div style="color:var(--text-faint);font-size:12px;">No specific dates added yet.</div>`
    : list.map((d, idx) => `
      <div class="chip">${fmtDate(d.date)}${d.label ? ' — ' + d.label : ''}
        <span class="x" onclick="removeSpecificOffDate(${idx})">✕</span>
      </div>`).join('');
}
function addSpecificOffDate() {
  const date = document.getElementById('newOffDate').value;
  const label = document.getElementById('newOffDateLabel').value;
  if (!date) { showToast('Pick a date first', 'error'); return; }
  window._pendingOffDaysSpecific = window._pendingOffDaysSpecific || [];
  window._pendingOffDaysSpecific.push({ date, label });
  document.getElementById('newOffDate').value = '';
  document.getElementById('newOffDateLabel').value = '';
  renderSpecificOffDatesList();
}
function removeSpecificOffDate(idx) {
  window._pendingOffDaysSpecific.splice(idx, 1);
  renderSpecificOffDatesList();
}
async function saveOffDaysConfig() {
  const weeklyOff = [...document.querySelectorAll('.weeklyOffCheck:checked')].map(cb => parseInt(cb.value));
  const specificDatesWithLabels = window._pendingOffDaysSpecific || [];
  const offDaysConfig = {
    weeklyOff,
    specificDates: specificDatesWithLabels.map(d => d.date),
    specificDatesWithLabels,
  };
  const json = JSON.stringify(offDaysConfig);
  const res = await apiPost('saveProjectInfo', { user: STATE.user, info: { OffDaysJSON: json } });
  if (res.success) {
    STATE.projectInfo.OffDaysJSON = json;
    closeModal();
    showToast('Off-days calendar saved', 'success');
    renderGanttBody();
  } else {
    showToast('Save failed: ' + (res.error||''), 'error');
  }
}

/* =====================================================================
   BASELINES VIEW
   ===================================================================== */
function confirmUnlockBaseline(baselineName) {
  confirmDialog(`Unlock baseline "<b>${baselineName}</b>"? Once unlocked, its dates can be edited again, and the change will be recorded in the audit log against your name. If you intend to re-freeze it later as a new revision, consider freezing a new baseline instead of editing this one.`, async () => {
    const rows = STATE.baselines.filter(b => b.BaselineName === baselineName && b.ActivityID !== '__PROJECT__');
    let unlocked = 0;
    for (const b of rows) {
      const res = await apiPost('unlockBaseline', { user: STATE.user, baselineId: b.BaselineID });
      if (res.success) { b.IsActive = false; unlocked++; }
      else { showToast(res.error || 'Could not unlock', 'error'); break; }
    }
    if (unlocked > 0) { showToast(`Unlocked ${unlocked} baseline entries`, 'success'); renderBaselines(document.querySelector('.view')); }
  });
}

function renderBaselines(container) {
  const baselineNames = [...new Set(STATE.baselines.map(b => b.BaselineName))];
  container.innerHTML = `
    <div class="toolbar">
      <h2 style="font-size:18px;">Baselines</h2>
      <p style="color:var(--text-dim);font-size:12px;">
        Every time you freeze a baseline on the Gantt chart, a full snapshot of planned dates is
        stored here. Compare any baseline against current planned dates to see drift.
      </p>
    </div>
    ${baselineNames.length === 0 ? `<div class="empty-state">No baselines frozen yet. Go to the Gantt chart and click "Freeze baseline".</div>` :
      baselineNames.map(name => renderBaselineCard(name)).join('')}
  `;
}
function renderBaselineCard(name) {
  const rows = STATE.baselines.filter(b => b.BaselineName === name && b.ActivityID !== '__PROJECT__');
  let totalDriftDays = 0, driftCount = 0;
  const tableRows = rows.map(b => {
    const a = getActivityById(b.ActivityID);
    if (!a) return '';
    const drift = daysBetween(b.BaselineFinish, a.PlannedFinish) || 0;
    totalDriftDays += drift; driftCount++;
    return `<tr>
      <td>${a.ShortDescription}</td>
      <td>${fmtDate(b.BaselineStart)} → ${fmtDate(b.BaselineFinish)}</td>
      <td>${fmtDate(a.PlannedStart)} → ${fmtDate(a.PlannedFinish)}</td>
      <td><span class="badge ${drift>0?'delayed':drift<0?'ahead':'on-time'}">${drift>0?'+':''}${drift} days</span></td>
    </tr>`;
  }).join('');
  const avgDrift = driftCount ? (totalDriftDays / driftCount).toFixed(1) : 0;
  const isLocked = rows.some(b => b.IsActive === true || b.IsActive === 'TRUE');
  return `
    <div class="card">
      <h3>${name}
        <span style="color:var(--text-faint);font-weight:400;">(avg drift: ${avgDrift} days)</span>
        ${isLocked
          ? `<span class="badge" style="background:rgba(110,118,129,0.25);color:var(--text-dim);margin-left:8px;">🔒 Frozen</span>`
          : `<span class="badge on-time" style="margin-left:8px;">Unlocked</span>`}
        ${isLocked && canEditBaselines() ? `<button class="btn sm" style="float:right;" onclick="confirmUnlockBaseline('${name}')">Unlock this baseline</button>` : ''}
      </h3>
      <div class="tbl-wrap"><table>
        <tr><th>Activity</th><th>Baseline dates</th><th>Current planned dates</th><th>Drift</th></tr>
        ${tableRows}
      </table></div>
    </div>`;
}

  el.innerHTML = `<div class="tbl-wrap"><table>
    <tr><th>Description</th><th>Deleted by</th><th>Deleted at</th><th></th></tr>
    ${items.map(a => `
      <tr>
        <td>${a.ShortDescription || a.LongDescription || '(untitled)'}</td>
        <td>${a.DeletedBy || ''}</td>
        <td>${fmtDate(a.DeletedAt)}</td>
        <td>
          <button class="btn sm primary" onclick="restoreFromBin('${a.ActivityID}')">Restore</button>
          <button class="btn sm danger" onclick="permanentlyDeleteFromBin('${a.ActivityID}')">Delete forever</button>
        </td>
      </tr>`).join('')}
  </table></div>`;
}
async function restoreFromBin(activityId) {
  const res = await apiPost('restoreActivity', { user: STATE.user, activityId });
  if (res.success) { showToast('Activity restored', 'success'); await loadAll(); renderRecycleBin(document.querySelector('.view')); }
}
function permanentlyDeleteFromBin(activityId) {
  confirmDialog('Permanently delete this activity? This cannot be undone — it will not be recoverable from anywhere, including the Sheet history for very long.', async () => {
    const res = await apiPost('deleteActivity', { user: STATE.user, activityId });
    if (res.success) { showToast('Permanently deleted', 'success'); renderRecycleBin(document.querySelector('.view')); }
  });
}

/* =====================================================================
   ACTIVITY HISTORY — surfaces the AuditLog sheet inside the app, so at
   177 projects you can spot-check "what happened here" without ever
   opening the raw Google Sheet.
   ===================================================================== */
async function renderActivityHistory(container) {
  container.innerHTML = `
    <div class="toolbar">
      <h2 style="font-size:18px;">Activity history</h2>
      <p style="color:var(--text-dim);font-size:12px;">
        Every save, import, delete, and baseline change in this project, newest first —
        who did it and when. Use this to check a contractor's or supervisor's recent
        changes without opening the underlying Sheet.
      </p>
      <div class="spacer"></div>
      <input type="search" id="historySearch" placeholder="Search by user or action…" oninput="renderHistoryTableBody()">
      <select id="historyActionFilter" onchange="renderHistoryTableBody()"><option value="">All actions</option></select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>When</th><th>User</th><th>Action</th><th>Type</th><th>Details</th></tr></thead>
      <tbody id="historyTableBody"><tr><td colspan="5"><div class="empty-state">Loading…</div></td></tr></tbody>
    </table></div>
  `;
  const res = await apiGet('getAuditLog');
  window._auditLogRows = res.success ? res.data : [];
  const actions = [...new Set(window._auditLogRows.map(r => r.Action).filter(Boolean))].sort();
  document.getElementById('historyActionFilter').innerHTML =
    `<option value="">All actions</option>` + actions.map(a => `<option value="${a}">${a}</option>`).join('');
  renderHistoryTableBody();
}
function renderHistoryTableBody() {
  const search = (document.getElementById('historySearch')?.value || '').toLowerCase();
  const actionFilter = document.getElementById('historyActionFilter')?.value || '';
  let rows = window._auditLogRows || [];
  if (search) rows = rows.filter(r => (r.User||'').toLowerCase().includes(search) || (r.Action||'').toLowerCase().includes(search));
  if (actionFilter) rows = rows.filter(r => r.Action === actionFilter);
  const body = document.getElementById('historyTableBody');
  if (rows.length === 0) { body.innerHTML = `<tr><td colspan="5"><div class="empty-state">No history yet, or none matching this search.</div></td></tr>`; return; }
  const flaggedActions = { blockedBaselineEdit: 'rust', blockedBaselineUnlock: 'rust', delete: 'gold', softDelete: 'gold', unlockBaseline: 'purple' };
  body.innerHTML = rows.slice(0, 300).map(r => {
    let details = '';
    try { const d = JSON.parse(r.Details || '{}'); details = Object.keys(d).length ? JSON.stringify(d).slice(0, 80) : ''; } catch(e){}
    const isBlocked = r.Action === 'blockedBaselineEdit' || r.Action === 'blockedBaselineUnlock';
    return `<tr ${isBlocked ? 'style="background:rgba(198,40,40,0.08);"' : ''}>
      <td>${r.Timestamp ? new Date(r.Timestamp).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</td>
      <td>${r.User || ''}</td>
      <td>${isBlocked ? '🚫 ' : ''}${r.Action || ''}</td>
      <td>${r.EntityType || ''}</td>
      <td style="font-size:11px;color:var(--text-faint);">${details}</td>
    </tr>`;
  }).join('');
  if (rows.length > 300) {
    body.innerHTML += `<tr><td colspan="5" style="text-align:center;color:var(--text-faint);">Showing the 300 most recent of ${rows.length} entries</td></tr>`;
  }
}

function renderUsers(container) {
  container.innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h3>Users</h3>
        <div id="usersList"></div>
        <button class="btn primary sm" onclick="openAddUserModal()" style="margin-top:10px;">+ Add user</button>
      </div>
      <div class="card">
        <h3>Color tags</h3>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:10px;">
          Used to color Gantt bars (e.g. "Critical path", "On hold"). Filter the Gantt chart by these tags.
        </p>
        <div id="colorsList"></div>
        <button class="btn primary sm" onclick="openAddColorModal()" style="margin-top:10px;">+ Add color tag</button>
      </div>
    </div>
    <div class="card">
      <h3>Backend connection</h3>
      <table>
        <tr><td style="color:var(--text-dim)">API URL</td><td style="font-size:11px;word-break:break-all;">${CONFIG.API_URL}</td></tr>
        <tr><td style="color:var(--text-dim)">Status</td><td>${STATE.apiReady ? '<span class="badge on-time">Connected</span>' : '<span class="badge delayed">Disconnected</span>'}</td></tr>
        <tr><td style="color:var(--text-dim)">Signed in as</td><td>${STATE.user || '—'}</td></tr>
      </table>
      <button class="btn sm" onclick="loadAll()" style="margin-top:10px;">Refresh data from sheet</button>
    </div>
  `;
  renderUsersList();
  renderColorsList();
}
function renderUsersList() {
  const el = document.getElementById('usersList');
  if (STATE.users.length === 0) { el.innerHTML = `<div class="empty-state">No users added yet. Anyone with the file link can currently edit.</div>`; return; }
  el.innerHTML = `<table>
    <tr><th>Name</th><th>Email</th><th>Role</th></tr>
    ${STATE.users.map(u => `<tr><td>${u.Name}</td><td>${u.Email}</td><td>${u.Role}</td></tr>`).join('')}
  </table>`;
}
function openAddUserModal() {
  openModal(`
    <h2>Add user</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">
      Note: this is a record of who should have access — actual edit permission is controlled by
      who you share the Google Sheet / hosted file with. This list is for tracking and the
      "signed in as" name dropdown.
    </p>
    <div class="field"><label>Name</label><input id="newUserName"></div>
    <div class="field"><label>Email</label><input id="newUserEmail" type="email"></div>
    <div class="field"><label>Role</label>
      <select id="newUserRole"><option>Project Manager</option><option>Site Engineer</option><option>Planning Engineer</option><option>Client Representative</option><option>Consultant</option><option>Viewer</option></select>
    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => saveNewUser())">Add user</button>
    </div>
  `);
}
async function saveNewUser() {
  const userRecord = {
    Name: document.getElementById('newUserName').value,
    Email: document.getElementById('newUserEmail').value,
    Role: document.getElementById('newUserRole').value,
  };
  const res = await apiPost('addUser', { user: STATE.user, userRecord });
  closeModal();
  if (res.success) { showToast('User added', 'success'); await loadAll(); }
}
function renderColorsList() {
  const el = document.getElementById('colorsList');
  el.innerHTML = STATE.colors.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;">
      <span class="color-swatch" style="background:${c.HexCode}"></span>
      <span style="flex:1;">${c.ColorName}</span>
      <span style="color:var(--text-faint);font-size:11px;">${c.HexCode}</span>
    </div>
  `).join('');
}
function openAddColorModal() {
  openModal(`
    <h2>Add color tag</h2>
    <div class="field"><label>Name</label><input id="newColorName" placeholder="e.g. Awaiting material"></div>
    <div class="field"><label>Color</label><input type="color" id="newColorHex" value="#3B82F6"></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => saveNewColor())">Add</button>
    </div>
  `);
}
async function saveNewColor() {
  const color = { ColorName: document.getElementById('newColorName').value, HexCode: document.getElementById('newColorHex').value };
  const res = await apiPost('saveColor', { user: STATE.user, color });
  closeModal();
  if (res.success) { showToast('Color tag added', 'success'); await loadAll(); }
}
