<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS Project Portfolio</title>
<style>
:root{
  --bg:#0F1419; --panel:#161B22; --panel2:#1C2128; --border:#2D333B;
  --text:#E6EDF3; --text-dim:#8B949E; --text-faint:#6E7681;
  --accent:#3B82F6; --green:#2E7D32; --red:#C62828; --orange:#E65100; --purple:#6A1B9A;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:13px;}
input:focus,select:focus{outline:1px solid var(--accent);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

#topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;}
#topbar .logo{font-weight:700;font-size:16px;color:#fff;}
#topbar .logo span{color:var(--accent);}
#apiStatus{font-size:11px;padding:4px 10px;border-radius:10px;}
#apiStatus.ok{background:rgba(46,125,50,0.2);color:#81C784;}
#apiStatus.err{background:rgba(198,40,40,0.2);color:#E57373;}
#apiStatus.pending{background:rgba(230,81,0,0.2);color:#FFB74D;}

.container{max-width:1400px;margin:0 auto;padding:20px;}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
.toolbar input[type=search]{min-width:260px;}

.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.stat-card{flex:1;min-width:130px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
.stat-card .value{font-size:24px;font-weight:700;color:#fff;}

.btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:#262C36;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
.btn.sm{padding:4px 10px;font-size:12px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;padding:9px 12px;background:var(--panel2);color:var(--text-dim);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
tr:hover td{background:rgba(255,255,255,0.02);}
.tbl-wrap{overflow:auto;max-height:75vh;border:1px solid var(--border);border-radius:8px;background:var(--panel);}

.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;}
.badge.active{background:rgba(46,125,50,0.2);color:#81C784;}
.badge.onhold{background:rgba(230,81,0,0.2);color:#FFB74D;}
.badge.completed{background:rgba(21,101,192,0.2);color:#64B5F6;}
.badge.archived{background:rgba(110,118,129,0.2);color:var(--text-dim);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;width:600px;max-width:92vw;max-height:88vh;overflow:auto;padding:22px;}
.modal h2{font-size:16px;margin-bottom:16px;}
.modal .field{margin-bottom:12px;}
.modal label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;}
.modal .field input,.modal .field select{width:100%;}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1C2128;border:1px solid var(--border);border-left:4px solid var(--accent);padding:10px 16px;border-radius:6px;font-size:13px;min-width:240px;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.toast.success{border-left-color:#2E7D32;}
.toast.error{border-left-color:#C62828;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
.link-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.link-row input{flex:1;font-family:monospace;font-size:11px;}
.link-row-label{width:120px;font-size:12px;color:var(--text-dim);flex-shrink:0;}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">HS <span>Project Portfolio</span></div>
  <div style="flex:1;"></div>
  <span id="apiStatus" class="pending">Connecting…</span>
</div>

<div class="container">
  <div class="stat-row" id="statsRow"></div>

  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="Search by project name, code, contractor, client…" oninput="renderTable()">
    <select id="statusFilter" onchange="renderTable()">
      <option value="">All statuses</option>
      <option value="Active">Active</option>
      <option value="OnHold">On hold</option>
      <option value="Completed">Completed</option>
      <option value="Archived">Archived</option>
    </select>
    <select id="contractorFilter" onchange="renderTable()"><option value="">All contractors</option></select>
    <div class="spacer"></div>
    <button class="btn primary" onclick="openCreateProjectModal()">+ New project</button>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Project</th><th>Code</th><th>Contractor</th><th>Supervisor</th><th>Status</th><th>Created</th><th></th>
      </tr></thead>
      <tbody id="projectsTableBody"><tr><td colspan="7"><div class="empty-state">Loading…</div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
const CONFIG = {
  PORTFOLIO_API_URL: 'https://script.google.com/macros/s/AKfycbxfMJgOmXdo7n-WDvbQkfaW4krEpGocI4XUVFvSIm4aeIrBasww-Fwnr9Oe69m32oN1/exec',
  PROJECT_APP_URL: 'PASTE_THE_URL_WHERE_YOU_HOST_Project_App.html_HERE',
};

let STATE = { projects: [] };

async function apiGet(action, params) {
  params = params || {};
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${CONFIG.PORTFOLIO_API_URL}?${qs}`);
  return res.json();
}
async function apiPost(action, body) {
  const res = await fetch(`${CONFIG.PORTFOLIO_API_URL}?action=${action}`, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  return res.json();
}
function setApiStatus(state, text) {
  const el = document.getElementById('apiStatus');
  el.className = state; el.textContent = text;
}
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });

function confirmDialog(message, onConfirm) {
  openModal(`
    <h2>Confirm action</h2>
    <p style="color:var(--text-dim);margin-bottom:18px;">${message}</p>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" id="confirmYesBtn">Yes, proceed</button>
    </div>
  `);
  document.getElementById('confirmYesBtn').onclick = () => { closeModal(); onConfirm(); };
}
function guardedClick(event, fn) {
  const btn = event.currentTarget || event.target;
  if (btn.dataset.busy === '1') return;
  btn.dataset.busy = '1';
  const originalText = btn.textContent;
  btn.disabled = true; btn.textContent = 'Working…';
  Promise.resolve(fn()).finally(() => {
    if (btn && btn.isConnected) { btn.disabled = false; btn.textContent = originalText; btn.dataset.busy = '0'; }
  });
}

async function loadProjects() {
  setApiStatus('pending', 'Loading…');
  try {
    const res = await apiGet('listProjects');
    if (!res.success) throw new Error(res.error || 'Unknown error');
    STATE.projects = res.data || [];
    setApiStatus('ok', `Connected · ${STATE.projects.length} projects`);
    renderStats();
    populateContractorFilter();
    renderTable();
  } catch (err) {
    setApiStatus('err', 'Connection failed');
    document.getElementById('projectsTableBody').innerHTML =
      `<tr><td colspan="7"><div class="empty-state">Could not load projects.<br>${err.message}</div></td></tr>`;
  }
}

function renderStats() {
  const total = STATE.projects.length;
  const active = STATE.projects.filter(p => p.Status === 'Active').length;
  const onHold = STATE.projects.filter(p => p.Status === 'OnHold').length;
  const completed = STATE.projects.filter(p => p.Status === 'Completed').length;
  const archived = STATE.projects.filter(p => p.Status === 'Archived').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="label">Total projects</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" style="color:#81C784">${active}</div></div>
    <div class="stat-card"><div class="label">On hold</div><div class="value" style="color:#FFB74D">${onHold}</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value" style="color:#64B5F6">${completed}</div></div>
    <div class="stat-card"><div class="label">Archived</div><div class="value" style="color:var(--text-dim)">${archived}</div></div>
  `;
}

function populateContractorFilter() {
  const sel = document.getElementById('contractorFilter');
  const contractors = [...new Set(STATE.projects.map(p => p.ContractorName).filter(Boolean))].sort();
  sel.innerHTML = `<option value="">All contractors</option>` + contractors.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderTable() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const contractorFilter = document.getElementById('contractorFilter').value;
  let rows = STATE.projects;
  if (search) {
    rows = rows.filter(p =>
      (p.ProjectName||'').toLowerCase().includes(search) ||
      (p.ProjectCode||'').toLowerCase().includes(search) ||
      (p.ContractorName||'').toLowerCase().includes(search) ||
      (p.ClientName||'').toLowerCase().includes(search) ||
      (p.ConsultantName||'').toLowerCase().includes(search)
    );
  }
  if (statusFilter) rows = rows.filter(p => p.Status === statusFilter);
  if (contractorFilter) rows = rows.filter(p => p.ContractorName === contractorFilter);

  const body = document.getElementById('projectsTableBody');
  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state">No projects match your search. <button class="btn sm primary" onclick="openCreateProjectModal()">+ Create one</button></div></td></tr>`;
    return;
  }
  const statusClass = { Active: 'active', OnHold: 'onhold', Completed: 'completed', Archived: 'archived' };
  body.innerHTML = rows.map(p => `
    <tr>
      <td><b>${p.ProjectName || '(unnamed)'}</b></td>
      <td>${p.ProjectCode || ''}</td>
      <td>${p.ContractorName || ''}</td>
      <td>${p.ClientName || ''}</td>
      <td><span class="badge ${statusClass[p.Status]||''}">${p.Status||''}</span></td>
      <td>${p.CreatedAt ? new Date(p.CreatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : ''}</td>
      <td>
        <button class="btn sm primary" onclick="openProjectLinks('${p.ProjectKey}')">Open / links</button>
        <button class="btn sm" onclick="openEditProjectModal('${p.ProjectKey}')">edit</button>
        ${p.Status !== 'Archived'
          ? `<button class="btn sm" onclick="confirmArchive('${p.ProjectKey}')">archive</button>`
          : `<button class="btn sm" onclick="restoreProject('${p.ProjectKey}')">restore</button>
             <button class="btn sm danger" onclick="confirmDeleteForever('${p.ProjectKey}')">delete forever</button>`}
      </td>
    </tr>`).join('');
}

function openCreateProjectModal() {
  openModal(`
    <h2>Create new project</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:14px;">
      This creates a brand-new Google Sheet with the full Activities/BOQ/Gantt
      structure already set up — no manual setup needed.
    </p>
    <div class="field"><label>Project name</label><input id="npName" placeholder="e.g. Lakeview Towers Phase 2"></div>
    <div class="grid-2">
      <div class="field"><label>Project code</label><input id="npCode"></div>
      <div class="field"><label>Contractor name</label><input id="npContractor"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Consultant name</label><input id="npConsultant"></div>
      <div class="field"><label>Supervisor / senior name</label><input id="npClient"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => createProject())">Create project</button>
    </div>
  `);
}
async function createProject() {
  const project = {
    ProjectName: document.getElementById('npName').value,
    ProjectCode: document.getElementById('npCode').value,
    ContractorName: document.getElementById('npContractor').value,
    ConsultantName: document.getElementById('npConsultant').value,
    ClientName: document.getElementById('npClient').value,
  };
  if (!project.ProjectName) { showToast('Project name is required', 'error'); return; }
  showToast('Creating project sheet — this takes a few seconds…', '');
  const res = await apiPost('createProject', { user: 'portfolio-owner', project });
  closeModal();
  if (res.success) {
    showToast('Project created: ' + project.ProjectName, 'success');
    await loadProjects();
    openProjectLinks(res.project.ProjectKey);
  } else {
    showToast('Could not create project: ' + res.error, 'error');
  }
}

function openEditProjectModal(projectKey) {
  const p = STATE.projects.find(x => x.ProjectKey === projectKey);
  openModal(`
    <h2>Edit project</h2>
    <div class="field"><label>Project name</label><input id="epName" value="${p.ProjectName||''}"></div>
    <div class="grid-2">
      <div class="field"><label>Project code</label><input id="epCode" value="${p.ProjectCode||''}"></div>
      <div class="field"><label>Status</label>
        <select id="epStatus">
          <option value="Active" ${p.Status==='Active'?'selected':''}>Active</option>
          <option value="OnHold" ${p.Status==='OnHold'?'selected':''}>On hold</option>
          <option value="Completed" ${p.Status==='Completed'?'selected':''}>Completed</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Contractor name</label><input id="epContractor" value="${p.ContractorName||''}"></div>
      <div class="field"><label>Consultant name</label><input id="epConsultant" value="${p.ConsultantName||''}"></div>
    </div>
    <div class="field"><label>Supervisor / senior name</label><input id="epClient" value="${p.ClientName||''}"></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="guardedClick(event, () => saveProjectEdit('${projectKey}'))">Save</button>
    </div>
  `);
}
async function saveProjectEdit(projectKey) {
  const updates = {
    ProjectName: document.getElementById('epName').value,
    ProjectCode: document.getElementById('epCode').value,
    Status: document.getElementById('epStatus').value,
    ContractorName: document.getElementById('epContractor').value,
    ConsultantName: document.getElementById('epConsultant').value,
    ClientName: document.getElementById('epClient').value,
  };
  const res = await apiPost('updateProject', { projectKey, updates });
  closeModal();
  if (res.success) { showToast('Project updated', 'success'); await loadProjects(); }
  else showToast('Update failed: ' + res.error, 'error');
}

function confirmArchive(projectKey) {
  const p = STATE.projects.find(x => x.ProjectKey === projectKey);
  confirmDialog(`Archive "<b>${p.ProjectName}</b>"? It will be hidden from the active list and all its links will stop working until restored. The underlying Sheet is not deleted.`, async () => {
    const res = await apiPost('archiveProject', { projectKey });
    if (res.success) { showToast('Project archived', 'success'); await loadProjects(); }
  });
}
async function restoreProject(projectKey) {
  const res = await apiPost('restoreProject', { projectKey });
  if (res.success) { showToast('Project restored', 'success'); await loadProjects(); }
}
function confirmDeleteForever(projectKey) {
  const p = STATE.projects.find(x => x.ProjectKey === projectKey);
  confirmDialog(`Permanently delete "<b>${p.ProjectName}</b>"? Its Google Sheet will be moved to your Drive trash (recoverable there for ~30 days) and removed from this portfolio list. This cannot be undone from here.`, async () => {
    const res = await apiPost('deleteProjectForever', { projectKey });
    if (res.success) { showToast('Project deleted', 'success'); await loadProjects(); }
  });
}

function buildProjectLink(key) {
  return `${CONFIG.PROJECT_APP_URL}?key=${key}`;
}
function openProjectLinks(projectKey) {
  const p = STATE.projects.find(x => x.ProjectKey === projectKey);
  openModal(`
    <h2>${p.ProjectName}</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px;">
      Share the right link with the right person. Each link only opens this
      one project. The client view-only link cannot save any changes.
    </p>
    <div class="link-row">
      <span class="link-row-label">You (full access)</span>
      <input readonly value="${buildProjectLink(p.ProjectKey)}" onclick="this.select()">
      <button class="btn sm" onclick="copyLink('${buildProjectLink(p.ProjectKey)}')">Copy</button>
    </div>
    <div class="link-row">
      <span class="link-row-label">Contractor</span>
      <input readonly value="${buildProjectLink(p.ContractorLinkKey)}" onclick="this.select()">
      <button class="btn sm" onclick="copyLink('${buildProjectLink(p.ContractorLinkKey)}')">Copy</button>
      <button class="btn sm" onclick="guardedClick(event, () => regenerateLink('${p.ProjectKey}','ContractorLinkKey'))" title="Invalidate the old link and generate a new one">↻</button>
    </div>
    <div class="link-row">
      <span class="link-row-label">Supervisor (view)</span>
      <input readonly value="${buildProjectLink(p.ClientViewLinkKey)}" onclick="this.select()">
      <button class="btn sm" onclick="copyLink('${buildProjectLink(p.ClientViewLinkKey)}')">Copy</button>
      <button class="btn sm" onclick="guardedClick(event, () => regenerateLink('${p.ProjectKey}','ClientViewLinkKey'))" title="Invalidate the old link and generate a new one">↻</button>
    </div>
    <div class="link-row">
      <span class="link-row-label">Supervisor (edit)</span>
      <input readonly value="${buildProjectLink(p.ClientEditLinkKey)}" onclick="this.select()">
      <button class="btn sm" onclick="copyLink('${buildProjectLink(p.ClientEditLinkKey)}')">Copy</button>
      <button class="btn sm" onclick="guardedClick(event, () => regenerateLink('${p.ProjectKey}','ClientEditLinkKey'))" title="Invalidate the old link and generate a new one">↻</button>
    </div>
    <p style="color:var(--text-faint);font-size:11px;margin-top:10px;">
      ↻ regenerates that link — use this if a link was shared with the wrong
      person by mistake; the old link stops working immediately.
    </p>
    <div class="actions">
      <a href="${p.SheetURL}" target="_blank" class="btn">Open underlying Google Sheet</a>
      <button class="btn primary" onclick="closeModal()">Done</button>
    </div>
  `);
}
function copyLink(link) {
  navigator.clipboard.writeText(link).then(() => showToast('Link copied to clipboard', 'success'));
}
async function regenerateLink(projectKey, linkType) {
  const res = await apiPost('regenerateLink', { projectKey, linkType, user: 'portfolio-owner' });
  if (res.success) {
    showToast('Link regenerated — the old one no longer works', 'success');
    await loadProjects();
    openProjectLinks(projectKey);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  if (CONFIG.PORTFOLIO_API_URL.indexOf('PASTE_YOUR') === 0) {
    setApiStatus('err', 'Setup required');
    document.getElementById('projectsTableBody').innerHTML = `
      <tr><td colspan="7"><div class="empty-state">
        Set <code>CONFIG.PORTFOLIO_API_URL</code> and <code>CONFIG.PROJECT_APP_URL</code>
        at the top of this file's script before using it. See the setup guide.
      </div></td></tr>`;
    return;
  }
  loadProjects();
});
</script>
</body>
</html>
